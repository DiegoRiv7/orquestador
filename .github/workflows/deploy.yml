name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: SSH Deploy → VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT }}
          script: |
            set -e

            # ── Clonar si es el primer deploy, o pull si ya existe ──
            if [ ! -d "$HOME/orquestador/.git" ]; then
              git clone https://github.com/DiegoRiv7/orquestador.git $HOME/orquestador
            else
              cd $HOME/orquestador && git pull origin main
            fi

            # ── Levantar el Panel con Docker Compose ────────────────
            cd $HOME/orquestador/frontend_vps
            docker compose down --remove-orphans
            docker compose up -d --build

            echo "✅ Deploy completado: $(date)"
