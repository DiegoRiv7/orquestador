<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Command Bridge - Chat Mode</title>
    <style>
        :root {
            --bg-black: #000000; --chat-bg: #111111; --bubble-user: #0A84FF; --bubble-system: #2C2C2E;
            --text-primary: #ffffff; --text-secondary: #ebebf5; --text-tertiary: rgba(235, 235, 245, 0.6);
            --border-glass: rgba(255, 255, 255, 0.15); --apple-green: #30D158; --apple-orange: #FF9F0A;
            --apple-red: #FF453A;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #050505; color: var(--text-primary); display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .mobile-container { width: 100%; max-width: 430px; height: 100vh; display: flex; flex-direction: column; position: relative; background-color: var(--chat-bg); box-shadow: 0 0 50px rgba(0,0,0,0.5); }

        header { padding: 50px 20px 15px 20px; background: rgba(17, 17, 17, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 0.5px solid var(--border-glass); display: flex; justify-content: space-between; align-items: center; position: absolute; top: 0; width: 100%; z-index: 10; }
        .header-title { font-size: 1.1rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .header-title::before { content: ''; width: 8px; height: 8px; background-color: var(--apple-green); border-radius: 50%; box-shadow: 0 0 8px var(--apple-green); transition: background-color 0.4s, box-shadow 0.4s; }
        .header-title.disconnected::before { background-color: var(--apple-red); box-shadow: 0 0 8px var(--apple-red); }
        .btn-lock { background: rgba(255,255,255,0.1); border: none; color: white; padding: 6px 12px; border-radius: 12px; font-size: 0.8rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 5px; }

        .chat-area { flex: 1; padding: 110px 20px 100px 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        .chat-area::-webkit-scrollbar { display: none; }

        .message { max-width: 85%; animation: slideUpMsg 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(15px); line-height: 1.5; }
        @keyframes slideUpMsg { to { opacity: 1; transform: translateY(0); } }
        .msg-user { align-self: flex-end; background: var(--bubble-user); color: white; padding: 12px 16px; border-radius: 20px 20px 4px 20px; font-size: 1rem; word-break: break-word; }
        .msg-system { align-self: flex-start; background: var(--bubble-system); color: var(--text-primary); padding: 16px; border-radius: 20px 20px 20px 4px; font-size: 0.95rem; border: 0.5px solid var(--border-glass); }
        .msg-system .title { font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; color: var(--text-secondary); }
        .msg-system .steps-list { display: flex; flex-direction: column; gap: 6px; }
        .msg-system .step-item { font-size: 0.9rem; color: var(--apple-orange); display: flex; align-items: center; gap: 8px; }
        .msg-system .step-item::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background-color: var(--apple-orange); flex-shrink: 0; animation: pulseDot 1.2s ease-in-out infinite; }
        @keyframes pulseDot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .msg-system .step-item.done { color: var(--apple-green); }
        .msg-system .step-item.done::before { background-color: var(--apple-green); box-shadow: 0 0 6px var(--apple-green); animation: none; opacity: 1; }

        .input-area { position: absolute; bottom: 0; width: 100%; padding: 10px 20px 30px 20px; background: linear-gradient(to top, rgba(17,17,17,1) 70%, rgba(17,17,17,0)); display: flex; align-items: flex-end; gap: 10px; }
        .input-wrapper { flex: 1; background: #2C2C2E; border-radius: 24px; padding: 12px 16px; display: flex; align-items: center; border: 0.5px solid var(--border-glass); }
        .input-wrapper input { flex: 1; background: transparent; border: none; color: white; font-size: 1rem; outline: none; }
        .input-wrapper input::placeholder { color: var(--text-tertiary); }
        .input-wrapper input:disabled { opacity: 0.5; }
        .btn-send { background: var(--bubble-user); width: 32px; height: 32px; border-radius: 50%; border: none; color: white; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: transform 0.1s, opacity 0.2s; flex-shrink: 0; }
        .btn-send:active { transform: scale(0.9); }
        .btn-send:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

        .lock-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, #1c2a4f, #000000); z-index: 1000; display: none; flex-direction: column; align-items: center; padding-top: 80px; animation: fadeInLock 0.3s ease-out; }
        @keyframes fadeInLock { from { opacity: 0; } to { opacity: 1; } }
        .lock-time { font-size: 5rem; font-weight: 200; margin-bottom: 40px; letter-spacing: -2px; }
        .live-activity { width: 90%; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 0.5px solid rgba(255,255,255,0.2); border-radius: 24px; padding: 20px; color: white; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .la-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .la-title { font-size: 0.9rem; font-weight: 600; color: rgba(255,255,255,0.8); display: flex; align-items: center; gap: 6px; }
        .la-icon { width: 20px; height: 20px; background: linear-gradient(135deg, var(--bubble-user), #5E5CE6); border-radius: 6px; display: inline-block; flex-shrink: 0; }
        .la-pulse { font-size: 0.75rem; color: var(--apple-orange); font-weight: 600; transition: color 0.3s; }
        .la-status { font-size: 1.15rem; font-weight: 500; margin-bottom: 15px; line-height: 1.3; }
        .unlock-hint { position: absolute; bottom: 40px; font-size: 0.9rem; color: rgba(255,255,255,0.5); display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
        .unlock-bar { width: 140px; height: 5px; background: white; border-radius: 5px; }

        /* ─── PIN Overlay ────────────────────────────────────────── */
        .pin-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; animation: fadeInLock 0.4s ease-out; }
        .pin-lock-icon { font-size: 3rem; line-height: 1; margin-bottom: 4px; }
        .pin-title { font-size: 1.9rem; font-weight: 700; letter-spacing: -0.5px; }
        .pin-subtitle { font-size: 0.9rem; color: var(--text-tertiary); margin-bottom: 4px; }
        .pin-input { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.18); border-radius: 18px; color: white; font-size: 2rem; font-weight: 300; letter-spacing: 0.6rem; padding: 14px 28px; text-align: center; width: 210px; outline: none; transition: border-color 0.2s; }
        .pin-input:focus { border-color: var(--bubble-user); box-shadow: 0 0 0 3px rgba(10,132,255,0.25); }
        .pin-input.shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; border-color: var(--apple-red) !important; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-10px)} 40%{transform:translateX(10px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }
        .pin-error { font-size: 0.85rem; color: var(--apple-red); min-height: 20px; font-weight: 500; letter-spacing: 0; }
        .pin-btn { background: var(--bubble-user); border: none; border-radius: 14px; color: white; font-size: 1rem; font-weight: 600; padding: 14px 44px; cursor: pointer; margin-top: 4px; transition: opacity 0.15s, transform 0.1s; }
        .pin-btn:active { opacity: 0.75; transform: scale(0.97); }
    </style>
</head>
<body>
    <div class="mobile-container">
        <header>
            <div class="header-title" id="headerTitle">Command Bridge</div>
            <button class="btn-lock" onclick="toggleLockScreen(true)">Bloquear</button>
        </header>
        <div class="chat-area" id="chatArea">
            <div class="msg-system">
                <div class="title">&#10024; Arquitecto IA</div>
                Conectando al Hub...
            </div>
        </div>
        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="cmdInput" placeholder="Escribe una orden..." onkeypress="if(event.key === 'Enter') sendMessage()">
            </div>
            <button class="btn-send" id="btnSend" onclick="sendMessage()">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
        <div class="lock-screen" id="lockScreen">
            <div class="lock-time" id="clock">09:41</div>
            <div class="live-activity">
                <div class="la-header">
                    <div class="la-title"><span class="la-icon"></span> Fabrica IA</div>
                    <div class="la-pulse" id="la-badge">Hub Online</div>
                </div>
                <div class="la-status" id="la-status-text">Esperando instrucciones...</div>
            </div>
            <div class="unlock-hint" onclick="toggleLockScreen(false)">Desbloquear<div class="unlock-bar"></div></div>
        </div>

        <!-- ─── PIN Overlay de seguridad ──────────────────────────── -->
        <div class="pin-overlay" id="pinOverlay" style="display:none;">
            <div class="pin-lock-icon">&#x1F512;</div>
            <div class="pin-title">Bridge Locked</div>
            <div class="pin-subtitle">Ingresa tu PIN de acceso</div>
            <input type="password" id="pinInput" class="pin-input" maxlength="6"
                   inputmode="numeric" pattern="[0-9]*" placeholder="••••"
                   onkeypress="if(event.key==='Enter') validatePIN()">
            <div class="pin-error" id="pinError"></div>
            <button class="pin-btn" onclick="validatePIN()">Acceder</button>
        </div>
    </div>

    <!-- Socket.io client — servido automáticamente por Express/Socket.io -->
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        // ─── Referencias DOM ──────────────────────────────────────────
        const chatArea     = document.getElementById('chatArea');
        const input        = document.getElementById('cmdInput');
        const btnSend      = document.getElementById('btnSend');
        const headerTitle  = document.getElementById('headerTitle');
        const laStatusText = document.getElementById('la-status-text');
        const laBadge      = document.getElementById('la-badge');
        const pinOverlay   = document.getElementById('pinOverlay');
        const pinInput     = document.getElementById('pinInput');
        const pinError     = document.getElementById('pinError');

        // ─── Reloj en tiempo real ─────────────────────────────────────
        (function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText =
                now.getHours().toString().padStart(2, '0') + ':' +
                now.getMinutes().toString().padStart(2, '0');
            setTimeout(updateClock, 1000);
        })();

        function toggleLockScreen(show) {
            document.getElementById('lockScreen').style.display = show ? 'flex' : 'none';
        }
        function scrollToBottom() {
            setTimeout(() => { chatArea.scrollTop = chatArea.scrollHeight; }, 50);
        }
        function escapeHtml(str) {
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }
        function setInputEnabled(enabled) {
            input.disabled   = !enabled;
            btnSend.disabled = !enabled;
        }

        let activeMsgId = null;
        let socket      = null;
        const MAC_HUB_URL = "https://boot-mem-ben-hire.trycloudflare.com";

        // ─── Arranque: reusar PIN de sesión si existe ─────────────────
        const savedPin = sessionStorage.getItem('bridge_pin');
        if (savedPin) {
            connectWithPin(savedPin);
        } else {
            pinOverlay.style.display = 'flex';
            setTimeout(() => pinInput.focus(), 400);
        }

        // ─── Validar PIN desde el botón / Enter ───────────────────────
        function validatePIN() {
            const pin = pinInput.value.trim();
            if (!pin) return;
            connectWithPin(pin);
        }

        // ─── Conectar con PIN como token de autenticación ─────────────
        function connectWithPin(pin) {
            if (socket) socket.disconnect();

            socket = io(MAC_HUB_URL, {
                auth:             { token: pin },
                reconnection:     true,
                reconnectionDelay: 2000
            });

            socket.on('connect', () => {
                sessionStorage.setItem('bridge_pin', pin);
                pinOverlay.style.display = 'none';
                headerTitle.classList.remove('disconnected');
                laBadge.textContent = 'Hub Online';
                laBadge.style.color = 'var(--apple-green)';
                const firstBubble = chatArea.querySelector('.msg-system');
                if (firstBubble && firstBubble.textContent.includes('Conectando')) {
                    firstBubble.innerHTML = '<div class="title">&#10024; Arquitecto IA</div>Conectado al Hub. Listo para orquestar.';
                }
            });

            socket.on('connect_error', () => {
                sessionStorage.removeItem('bridge_pin');
                pinError.textContent = 'PIN Incorrecto';
                pinInput.classList.remove('shake');
                void pinInput.offsetWidth; // fuerza reflow para reiniciar animación
                pinInput.classList.add('shake');
                pinInput.value = '';
                pinOverlay.style.display = 'flex';
                setTimeout(() => pinInput.focus(), 50);
                setTimeout(() => {
                    pinInput.classList.remove('shake');
                    pinError.textContent = '';
                }, 1500);
                socket.disconnect();
            });

            socket.on('disconnect', () => {
                headerTitle.classList.add('disconnected');
                laBadge.textContent = 'Offline';
                laBadge.style.color = 'var(--apple-red)';
                laStatusText.innerText = 'Conexion perdida con el servidor.';
                setInputEnabled(true);
            });

            socket.on('server:status_update', (data) => {
                const { step, totalSteps, status, message } = data;
                const isCompleted = status === 'completed';
                laStatusText.innerText = `[${step}/${totalSteps}] ${message}`;
                laBadge.textContent    = isCompleted ? 'Completado' : 'Procesando...';
                laBadge.style.color    = isCompleted ? 'var(--apple-green)' : 'var(--apple-orange)';
                if (activeMsgId) {
                    const bubble = document.getElementById(activeMsgId);
                    if (bubble) {
                        const stepEl = document.createElement('div');
                        stepEl.className = 'step-item' + (isCompleted ? ' done' : '');
                        stepEl.textContent = `[${step}/${totalSteps}] ${message}`;
                        bubble.querySelector('.steps-list').appendChild(stepEl);
                    }
                }
                if (isCompleted) {
                    activeMsgId = null;
                    setInputEnabled(true);
                    setTimeout(() => {
                        laBadge.textContent = 'Hub Online';
                        laBadge.style.color = 'var(--apple-green)';
                    }, 3000);
                }
                scrollToBottom();
            });
        }

        // ─── Enviar comando ───────────────────────────────────────────
        function sendMessage() {
            const text = input.value.trim();
            if (!text || btnSend.disabled || !socket) return;
            chatArea.insertAdjacentHTML('beforeend',
                `<div class="message msg-user">${escapeHtml(text)}</div>`
            );
            input.value = '';
            scrollToBottom();
            setInputEnabled(false);
            const msgId = 'msg-' + Date.now();
            activeMsgId = msgId;
            chatArea.insertAdjacentHTML('beforeend', `
                <div class="message msg-system" id="${msgId}">
                    <div class="title">&#10024; Arquitecto IA</div>
                    <div class="steps-list"></div>
                </div>
            `);
            scrollToBottom();
            socket.emit('client:send_command', { command: text });
            laStatusText.innerText = `Procesando: "${text}"`;
            laBadge.textContent    = 'Procesando...';
            laBadge.style.color    = 'var(--apple-orange)';
        }
    </script>
</body>
</html>
