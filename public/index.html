<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Factory</title>
    <style>
        :root {
            --bg: #111111;
            --surface: #1C1C1E;
            --surface2: #2C2C2E;
            --blue: #0A84FF;
            --green: #30D158;
            --orange: #FF9F0A;
            --red: #FF453A;
            --purple: #BF5AF2;
            --text: #FFFFFF;
            --text2: rgba(235,235,245,0.75);
            --text3: rgba(235,235,245,0.45);
            --border: rgba(255,255,255,0.1);
            --border2: rgba(255,255,255,0.06);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; -webkit-tap-highlight-color: transparent; }

        body { background: #000; color: var(--text); display: flex; justify-content: center; height: 100dvh; overflow: hidden; }

        .app { width: 100%; max-width: 430px; height: 100dvh; display: flex; flex-direction: column; background: var(--bg); position: relative; overflow: hidden; }

        /* ── Header ─────────────────────────────────────── */
        header {
            padding: 52px 20px 14px;
            background: rgba(17,17,17,0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            flex-shrink: 0;
            z-index: 10;
        }
        .h-left { display: flex; align-items: center; gap: 9px; }
        .h-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); transition: all 0.4s; flex-shrink: 0; }
        .h-dot.off { background: var(--red); box-shadow: 0 0 8px var(--red); }
        .h-dot.busy { background: var(--orange); box-shadow: 0 0 8px var(--orange); animation: pulse 1.2s ease-in-out infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .h-title { font-size: 1rem; font-weight: 600; }
        .h-stage { font-size: 0.72rem; color: var(--text3); margin-top: 1px; }
        .btn-lock { background: rgba(255,255,255,0.08); border: 0.5px solid var(--border); border-radius: 10px; color: var(--text2); padding: 6px 12px; font-size: 0.78rem; font-weight: 600; cursor: pointer; }

        /* ── Chat log ────────────────────────────────────── */
        .chat { flex: 1; overflow-y: auto; padding: 16px 16px 12px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        .chat::-webkit-scrollbar { display: none; }

        /* bubbles */
        .bubble { animation: rise 0.35s cubic-bezier(0.16,1,0.3,1) forwards; opacity: 0; transform: translateY(12px); max-width: 88%; }
        @keyframes rise { to { opacity:1; transform:translateY(0); } }
        .bubble-user { align-self: flex-end; background: var(--blue); color: white; padding: 11px 15px; border-radius: 20px 20px 5px 20px; font-size: 0.95rem; line-height: 1.4; word-break: break-word; }
        .bubble-sys { align-self: flex-start; background: var(--surface); border: 0.5px solid var(--border); border-radius: 20px 20px 20px 5px; padding: 13px 15px; font-size: 0.9rem; color: var(--text2); line-height: 1.5; }
        .bubble-sys strong { display: block; font-size: 0.78rem; color: var(--text3); font-weight: 600; margin-bottom: 5px; letter-spacing: 0.3px; text-transform: uppercase; }
        .bubble-progress { align-self: flex-start; display: flex; align-items: center; gap: 10px; font-size: 0.88rem; color: var(--text3); padding: 6px 4px; }
        .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.15); border-top-color: var(--orange); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* result cards */
        .result-card { align-self: flex-start; max-width: 92%; background: var(--surface); border: 0.5px solid var(--border); border-radius: 16px; overflow: hidden; }
        .rc-header { padding: 10px 14px; display: flex; align-items: center; gap: 8px; border-bottom: 0.5px solid var(--border2); }
        .rc-icon { width: 22px; height: 22px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; flex-shrink: 0; }
        .rc-icon.gemini { background: linear-gradient(135deg, #4285F4, #8B5CF6); }
        .rc-icon.manus  { background: linear-gradient(135deg, #FF9F0A, #FF453A); }
        .rc-icon.claude { background: linear-gradient(135deg, #30D158, #0A84FF); }
        .rc-icon.deploy { background: linear-gradient(135deg, #30D158, #34C759); }
        .rc-label { font-size: 0.78rem; font-weight: 700; color: var(--text2); letter-spacing: 0.3px; }
        .rc-body { padding: 11px 14px; font-size: 0.85rem; color: var(--text2); line-height: 1.5; white-space: pre-wrap; word-break: break-word; max-height: 120px; overflow-y: auto; }
        .rc-body::-webkit-scrollbar { width: 3px; }
        .rc-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
        .rc-url { padding: 10px 14px; display: flex; align-items: center; gap: 8px; }
        .rc-url a { color: var(--blue); font-size: 0.85rem; text-decoration: none; font-weight: 500; word-break: break-all; }

        /* ── Action panel (bottom) ───────────────────────── */
        .action-panel {
            flex-shrink: 0;
            padding: 12px 16px 30px;
            background: linear-gradient(to top, var(--bg) 85%, transparent);
            border-top: 0.5px solid var(--border2);
        }

        /* IDLE: idea input */
        .idea-area { display: flex; flex-direction: column; gap: 10px; }
        .idea-textarea { background: var(--surface2); border: 0.5px solid var(--border); border-radius: 16px; color: var(--text); font-size: 0.95rem; padding: 13px 15px; width: 100%; resize: none; min-height: 72px; max-height: 130px; outline: none; line-height: 1.5; }
        .idea-textarea::placeholder { color: var(--text3); }
        .btn-start { background: var(--blue); border: none; border-radius: 14px; color: white; font-size: 1rem; font-weight: 600; padding: 14px; width: 100%; cursor: pointer; transition: opacity 0.15s, transform 0.1s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-start:active { opacity: 0.8; transform: scale(0.98); }

        /* Working: progress only */
        .working-area { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 6px 0; }
        .working-label { font-size: 0.92rem; color: var(--text2); font-weight: 500; text-align: center; }
        .working-sublabel { font-size: 0.78rem; color: var(--text3); text-align: center; }
        .btn-cancel { background: transparent; border: 0.5px solid var(--border); border-radius: 10px; color: var(--text3); font-size: 0.82rem; padding: 8px 20px; cursor: pointer; }

        /* Action buttons grid */
        .action-grid { display: grid; gap: 9px; }
        .action-grid.cols-1 { grid-template-columns: 1fr; }
        .action-grid.cols-2 { grid-template-columns: 1fr 1fr; }
        .action-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }

        .ab { border: none; border-radius: 13px; font-size: 0.88rem; font-weight: 600; padding: 13px 10px; cursor: pointer; transition: opacity 0.15s, transform 0.1s; text-align: center; line-height: 1.2; }
        .ab:active { opacity: 0.75; transform: scale(0.97); }
        .ab-primary { background: var(--green); color: #000; }
        .ab-blue    { background: var(--blue); color: white; }
        .ab-orange  { background: rgba(255,159,10,0.18); color: var(--orange); border: 0.5px solid rgba(255,159,10,0.25); }
        .ab-ghost   { background: var(--surface2); color: var(--text2); border: 0.5px solid var(--border); }
        .ab-red     { background: rgba(255,69,58,0.15); color: var(--red); border: 0.5px solid rgba(255,69,58,0.2); }
        .ab-purple  { background: var(--purple); color: white; }
        .ab-full    { grid-column: 1 / -1; }

        /* Done / deploy success */
        .done-area { display: flex; flex-direction: column; gap: 10px; }

        /* ── Custom text overlay ─────────────────────────── */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); z-index: 500; display: flex; align-items: flex-end; justify-content: center; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        .overlay-sheet { background: var(--surface); border-radius: 24px 24px 0 0; padding: 20px 20px 40px; width: 100%; max-width: 430px; display: flex; flex-direction: column; gap: 12px; animation: slideUp 0.3s cubic-bezier(0.16,1,0.3,1); }
        @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
        .overlay-title { font-size: 0.85rem; font-weight: 700; color: var(--text3); letter-spacing: 0.4px; text-align: center; }
        .overlay-textarea { background: var(--surface2); border: 0.5px solid var(--border); border-radius: 14px; color: var(--text); font-size: 0.95rem; padding: 12px 14px; width: 100%; resize: none; min-height: 90px; outline: none; line-height: 1.5; }
        .overlay-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
        .btn-ov-cancel { background: var(--surface2); border: 0.5px solid var(--border); border-radius: 12px; color: var(--text2); font-size: 0.9rem; font-weight: 600; padding: 12px; cursor: pointer; }
        .btn-ov-confirm { background: var(--blue); border: none; border-radius: 12px; color: white; font-size: 0.9rem; font-weight: 600; padding: 12px; cursor: pointer; }

        /* ── Lock screen ─────────────────────────────────── */
        .lock-screen {
            position: absolute; inset: 0;
            background: linear-gradient(170deg, #0d1b3e 0%, #000 60%);
            z-index: 100; display: none; flex-direction: column; align-items: center;
            padding-top: 70px;
        }
        .lock-time { font-size: 5.5rem; font-weight: 200; letter-spacing: -3px; margin-bottom: 35px; }
        .la-card { width: 88%; background: rgba(0,0,0,0.55); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 0.5px solid rgba(255,255,255,0.18); border-radius: 22px; padding: 18px 20px; }
        .la-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .la-name { font-size: 0.85rem; font-weight: 700; color: rgba(255,255,255,0.75); display: flex; align-items: center; gap: 7px; }
        .la-badge { font-size: 0.75rem; font-weight: 600; color: var(--orange); }
        .la-msg { font-size: 1.05rem; font-weight: 500; line-height: 1.35; color: white; }
        .unlock-btn { position: absolute; bottom: 38px; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; color: rgba(255,255,255,0.5); font-size: 0.85rem; }
        .unlock-bar { width: 130px; height: 4px; background: rgba(255,255,255,0.6); border-radius: 4px; }

        /* ── PIN overlay ─────────────────────────────────── */
        .pin-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.92); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
        .pin-icon { font-size: 2.8rem; }
        .pin-title { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; }
        .pin-sub { font-size: 0.88rem; color: var(--text3); }
        .pin-input { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); border-radius: 16px; color: white; font-size: 2rem; font-weight: 300; letter-spacing: 0.6rem; padding: 13px 26px; text-align: center; width: 200px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; margin-top: 6px; }
        .pin-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(10,132,255,0.2); }
        .pin-input.shake { animation: shake 0.4s both; border-color: var(--red) !important; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-10px)} 40%{transform:translateX(10px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }
        .pin-error { font-size: 0.82rem; color: var(--red); min-height: 18px; font-weight: 500; }
        .pin-btn { background: var(--blue); border: none; border-radius: 13px; color: white; font-size: 1rem; font-weight: 600; padding: 13px 44px; cursor: pointer; margin-top: 4px; }
    </style>
</head>
<body>
<div class="app">

    <!-- ── Header ─────────────────────────────────────────── -->
    <header>
        <div class="h-left">
            <div class="h-dot off" id="hDot"></div>
            <div>
                <div class="h-title">AI Factory</div>
                <div class="h-stage" id="hStage">Desconectado</div>
            </div>
        </div>
        <button class="btn-lock" onclick="showLock(true)">Bloquear</button>
    </header>

    <!-- ── Chat log ───────────────────────────────────────── -->
    <div class="chat" id="chat">
        <div class="bubble bubble-sys">
            <strong>Sistema</strong>
            Conectando al Hub...
        </div>
    </div>

    <!-- ── Action panel ───────────────────────────────────── -->
    <div class="action-panel" id="actionPanel">
        <div id="panelContent"></div>
    </div>

    <!-- ── Lock screen ────────────────────────────────────── -->
    <div class="lock-screen" id="lockScreen">
        <div class="lock-time" id="clock">00:00</div>
        <div class="la-card">
            <div class="la-row">
                <div class="la-name">
                    <span style="width:18px;height:18px;border-radius:6px;background:linear-gradient(135deg,var(--blue),var(--purple));display:inline-block;flex-shrink:0;"></span>
                    AI Factory
                </div>
                <div class="la-badge" id="laBadge">Offline</div>
            </div>
            <div class="la-msg" id="laMsg">Esperando instrucciones...</div>
        </div>
        <div class="unlock-btn" onclick="showLock(false)">
            Desliza para abrir
            <div class="unlock-bar"></div>
        </div>
    </div>

    <!-- ── PIN overlay ────────────────────────────────────── -->
    <div class="pin-overlay" id="pinOverlay" style="display:none;">
        <div class="pin-icon">&#x1F512;</div>
        <div class="pin-title">Bridge Locked</div>
        <div class="pin-sub">Ingresa tu PIN de acceso</div>
        <input class="pin-input" id="pinInput" type="password" inputmode="numeric" maxlength="6" placeholder="••••" onkeypress="if(event.key==='Enter')validatePIN()">
        <div class="pin-error" id="pinError"></div>
        <button class="pin-btn" onclick="validatePIN()">Acceder</button>
    </div>

</div>

<!-- Custom text overlay (shared modal) -->
<div class="overlay" id="customOverlay" style="display:none;" onclick="if(event.target===this)closeOverlay()">
    <div class="overlay-sheet">
        <div class="overlay-title" id="overlayTitle">EDITAR TEXTO</div>
        <textarea class="overlay-textarea" id="overlayText" rows="4" placeholder="Escribe aquí..."></textarea>
        <div class="overlay-actions">
            <button class="btn-ov-cancel" onclick="closeOverlay()">Cancelar</button>
            <button class="btn-ov-confirm" id="overlayConfirm" onclick="confirmOverlay()">Enviar</button>
        </div>
    </div>
</div>

<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script>
// ── Config ──────────────────────────────────────────────────
const MAC_HUB_URL = "https://minor-arguments-folk-cookies.trycloudflare.com";

// ── State ───────────────────────────────────────────────────
const S = { IDLE:'idle', GEMINI_WORKING:'gemini_working', GEMINI_DONE:'gemini_done', MANUS_WORKING:'manus_working', MANUS_DONE:'manus_done', CLAUDE_WORKING:'claude_working', CLAUDE_DONE:'claude_done', DEPLOYING:'deploying', DONE:'done' };
let currentState = S.IDLE;
let currentData  = {};
let overlayAction = null;
let socket = null;
let progressBubbleId = null;

// ── DOM refs ─────────────────────────────────────────────────
const chat        = document.getElementById('chat');
const hDot        = document.getElementById('hDot');
const hStage      = document.getElementById('hStage');
const laBadge     = document.getElementById('laBadge');
const laMsg       = document.getElementById('laMsg');
const panelContent = document.getElementById('panelContent');
const pinOverlay  = document.getElementById('pinOverlay');
const pinInput    = document.getElementById('pinInput');
const pinError    = document.getElementById('pinError');

// ── Clock ────────────────────────────────────────────────────
(function tick() {
    const n = new Date();
    document.getElementById('clock').textContent =
        String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
    setTimeout(tick, 1000);
})();

// ── Lock screen ──────────────────────────────────────────────
function showLock(v) { document.getElementById('lockScreen').style.display = v ? 'flex' : 'none'; }

// ── Escape HTML ──────────────────────────────────────────────
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Scroll ───────────────────────────────────────────────────
function scrollBottom() { setTimeout(() => { chat.scrollTop = chat.scrollHeight; }, 60); }

// ── Add bubbles ──────────────────────────────────────────────
function addUserBubble(text) {
    const d = document.createElement('div');
    d.className = 'bubble bubble-user';
    d.textContent = text;
    chat.appendChild(d);
    scrollBottom();
}

function addSysBubble(label, text) {
    const d = document.createElement('div');
    d.className = 'bubble bubble-sys';
    d.innerHTML = `<strong>${esc(label)}</strong>${esc(text)}`;
    chat.appendChild(d);
    scrollBottom();
    return d;
}

function addProgress(text) {
    // reuse existing progress bubble or create new
    if (progressBubbleId) {
        const el = document.getElementById(progressBubbleId);
        if (el) { el.querySelector('span').textContent = text; scrollBottom(); return; }
    }
    const id = 'prog-' + Date.now();
    progressBubbleId = id;
    const d = document.createElement('div');
    d.className = 'bubble bubble-progress';
    d.id = id;
    d.innerHTML = `<div class="spinner"></div><span>${esc(text)}</span>`;
    chat.appendChild(d);
    scrollBottom();
}

function removeProgress() {
    if (progressBubbleId) {
        const el = document.getElementById(progressBubbleId);
        if (el) el.remove();
        progressBubbleId = null;
    }
}

function addResultCard(type, label, content) {
    removeProgress();
    const d = document.createElement('div');
    d.className = 'bubble result-card';
    const snippet = content ? content.slice(0, 400) : '';
    d.innerHTML = `
        <div class="rc-header">
            <div class="rc-icon ${type}">✦</div>
            <div class="rc-label">${esc(label)}</div>
        </div>
        <div class="rc-body">${esc(snippet)}${content && content.length > 400 ? '...' : ''}</div>
    `;
    chat.appendChild(d);
    scrollBottom();
}

function addDeployCard(url) {
    removeProgress();
    const d = document.createElement('div');
    d.className = 'bubble result-card';
    d.innerHTML = `
        <div class="rc-header">
            <div class="rc-icon deploy">🚀</div>
            <div class="rc-label">DEPLOY COMPLETADO</div>
        </div>
        <div class="rc-url"><a href="${esc(url)}" target="_blank">${esc(url)}</a></div>
    `;
    chat.appendChild(d);
    scrollBottom();
}

// ── Header state ─────────────────────────────────────────────
function setHeaderState(state) {
    hDot.className = 'h-dot';
    if (state === 'connected') { hDot.classList.add(''); hStage.textContent = 'Conectado'; laBadge.textContent = 'Online'; laBadge.style.color = 'var(--green)'; }
    else if (state === 'busy')   { hDot.classList.add('busy'); laBadge.textContent = 'Trabajando'; laBadge.style.color = 'var(--orange)'; }
    else                          { hDot.classList.add('off'); hStage.textContent = 'Desconectado'; laBadge.textContent = 'Offline'; laBadge.style.color = 'var(--red)'; }
}

// ── Render action panel ──────────────────────────────────────
function renderPanel(state, data) {
    currentState = state;
    currentData  = data || {};
    const p = panelContent;

    const stageLabels = {
        idle:           'Listo',
        gemini_working: 'Gemini trabajando...',
        gemini_done:    'Gemini terminó',
        manus_working:  'Manus trabajando...',
        manus_done:     'Manus terminó',
        claude_working: 'Claude trabajando...',
        claude_done:    'Claude terminó',
        deploying:      'Desplegando...',
        done:           'Completado'
    };
    hStage.textContent = stageLabels[state] || state;

    if (state === S.IDLE) {
        p.innerHTML = `
            <div class="idea-area">
                <textarea class="idea-textarea" id="ideaInput" placeholder="¿Qué proyecto quieres construir hoy?" rows="3"></textarea>
                <button class="btn-start" onclick="startIdea()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                    Iniciar con Gemini
                </button>
            </div>`;
        setTimeout(() => { const t = document.getElementById('ideaInput'); if(t) t.focus(); }, 100);
    }

    else if (state === S.GEMINI_WORKING || state === S.MANUS_WORKING || state === S.CLAUDE_WORKING || state === S.DEPLOYING) {
        const labels = { gemini_working:'Refinando idea con Gemini', manus_working:'Manus construyendo el proyecto', claude_working:'Claude Code revisando y corrigiendo', deploying:'Empujando a GitHub y desplegando' };
        const sublabels = { gemini_working:'Monitoreando respuesta automáticamente', manus_working:'Esto puede tardar varios minutos', claude_working:'Analizando y aplicando mejoras', deploying:'Git push → GitHub Actions → VPS' };
        const captureAction = state === S.GEMINI_WORKING ? 'capture_gemini' : state === S.MANUS_WORKING ? 'capture_manus' : null;
        setHeaderState('busy');
        p.innerHTML = `
            <div class="working-area">
                <div class="spinner" style="width:28px;height:28px;border-width:3px;"></div>
                <div class="working-label">${labels[state]}</div>
                <div class="working-sublabel">${sublabels[state]}</div>
                ${captureAction === 'capture_gemini' ? `<button class="ab ab-orange" style="margin-top:4px;" onclick="sendAction('${captureAction}')">📋 Copié la respuesta — Capturar</button>` : ''}
                ${captureAction === 'capture_manus' ? `<button class="ab ab-orange" style="margin-top:4px;" onclick="sendAction('${captureAction}')">📋 Copié el resultado — Capturar</button>` : ''}
                <button class="btn-cancel" onclick="sendAction('cancel')">Cancelar</button>
            </div>`;
    }

    else if (state === S.GEMINI_DONE) {
        const preview = (data && data.result) ? data.result.slice(0, 600) : '(sin resultado)';
        p.innerHTML = `
            <div style="background:var(--surface2);border:0.5px solid var(--border);border-radius:14px;padding:11px 13px;margin-bottom:10px;max-height:140px;overflow-y:auto;">
                <div style="font-size:0.72rem;font-weight:700;color:var(--text3);letter-spacing:0.3px;margin-bottom:6px;">GEMINI — RESPUESTA</div>
                <div style="font-size:0.82rem;color:var(--text2);line-height:1.5;white-space:pre-wrap;word-break:break-word;">${esc(preview)}${data && data.result && data.result.length > 600 ? '...' : ''}</div>
            </div>
            <div class="action-grid cols-1" style="margin-bottom:9px;">
                <button class="ab ab-primary" onclick="sendAction('send_manus')">Enviar a Manus →</button>
            </div>
            <div class="action-grid cols-2">
                <button class="ab ab-ghost" onclick="openOverlay('Refinar prompt en Gemini','¿Qué ajuste necesita el prompt?','refine_gemini')">Refinar</button>
                <button class="ab ab-ghost" onclick="openOverlay('Enviar mensaje a Gemini','Escribe tu instrucción directa a Gemini','custom_gemini')">Personalizar</button>
            </div>`;
    }

    else if (state === S.MANUS_DONE) {
        const preview = (data && data.result) ? data.result.slice(0, 600) : '(sin resultado)';
        p.innerHTML = `
            <div style="background:var(--surface2);border:0.5px solid var(--border);border-radius:14px;padding:11px 13px;margin-bottom:10px;max-height:120px;overflow-y:auto;">
                <div style="font-size:0.72rem;font-weight:700;color:var(--text3);letter-spacing:0.3px;margin-bottom:6px;">MANUS — RESULTADO</div>
                <div style="font-size:0.82rem;color:var(--text2);line-height:1.5;white-space:pre-wrap;word-break:break-word;">${esc(preview)}${data && data.result && data.result.length > 600 ? '...' : ''}</div>
            </div>
            <div class="action-grid cols-1" style="margin-bottom:9px;">
                <button class="ab ab-blue" onclick="sendAction('manus_to_claude')">Enviar a Claude Code →</button>
            </div>
            <div class="action-grid cols-3">
                <button class="ab ab-orange" onclick="sendAction('deploy_from_manus')">Deploy directo</button>
                <button class="ab ab-ghost" onclick="sendAction('retry_manus')">Reintentar</button>
                <button class="ab ab-ghost" onclick="openOverlay('Mensaje a Gemini','Pide a Gemini que refine el prompt de nuevo','refine_gemini')">Refinar</button>
            </div>`;
    }

    else if (state === S.CLAUDE_DONE) {
        const preview = (data && data.result) ? data.result.slice(0, 600) : '(sin resultado)';
        p.innerHTML = `
            <div style="background:var(--surface2);border:0.5px solid var(--border);border-radius:14px;padding:11px 13px;margin-bottom:10px;max-height:120px;overflow-y:auto;">
                <div style="font-size:0.72rem;font-weight:700;color:var(--text3);letter-spacing:0.3px;margin-bottom:6px;">CLAUDE — REVISION</div>
                <div style="font-size:0.82rem;color:var(--text2);line-height:1.5;white-space:pre-wrap;word-break:break-word;">${esc(preview)}${data && data.result && data.result.length > 600 ? '...' : ''}</div>
            </div>
            <div class="action-grid cols-1" style="margin-bottom:9px;">
                <button class="ab ab-primary" onclick="sendAction('deploy')">Deploy a VPS</button>
            </div>
            <div class="action-grid cols-2">
                <button class="ab ab-ghost" onclick="sendAction('retry_claude')">Reintentar Claude</button>
                <button class="ab ab-ghost" onclick="openOverlay('Instrucción para Claude','¿Qué corrección quieres aplicar?','custom_claude')">Personalizar</button>
            </div>`;
    }

    else if (state === S.DONE) {
        const url = currentData.url || '';
        p.innerHTML = `
            <div class="done-area">
                ${url ? `<a href="${esc(url)}" target="_blank" style="background:rgba(48,209,88,0.12);border:0.5px solid rgba(48,209,88,0.25);border-radius:13px;color:var(--green);font-size:0.85rem;font-weight:600;padding:13px 14px;text-align:center;display:block;word-break:break-all;">${esc(url)}</a>` : ''}
                <button class="ab ab-ghost" onclick="sendAction('new_project')">+ Nuevo Proyecto</button>
            </div>`;
    }
}

// ── Send idea ────────────────────────────────────────────────
function startIdea() {
    const t = document.getElementById('ideaInput');
    if (!t) return;
    const text = t.value.trim();
    if (!text) { t.style.borderColor = 'var(--red)'; setTimeout(() => t.style.borderColor = '', 800); return; }
    if (!socket || !socket.connected) { addSysBubble('Error', 'Sin conexión al Hub. Verifica el túnel Cloudflare.'); return; }
    addUserBubble(text);
    socket.emit('fab:idea', { text });
    renderPanel(S.GEMINI_WORKING);
    addProgress('Enviando idea a Gemini...');
}

// ── Send action button ────────────────────────────────────────
function sendAction(action, text) {
    if (!socket || !socket.connected) return;
    const payload = { action };
    if (text) payload.text = text;
    socket.emit('fab:action', payload);
}

// ── Overlay helpers ───────────────────────────────────────────
function openOverlay(title, placeholder, action) {
    overlayAction = action;
    document.getElementById('overlayTitle').textContent = title.toUpperCase();
    const ta = document.getElementById('overlayText');
    ta.placeholder = placeholder;
    ta.value = '';
    document.getElementById('customOverlay').style.display = 'flex';
    setTimeout(() => ta.focus(), 200);
}
function closeOverlay() {
    document.getElementById('customOverlay').style.display = 'none';
    overlayAction = null;
}
function confirmOverlay() {
    const text = document.getElementById('overlayText').value.trim();
    if (!text) return;
    closeOverlay();
    addUserBubble(text);
    sendAction(overlayAction, text);
}

// ── Socket setup ──────────────────────────────────────────────
function connectWithPin(pin) {
    if (socket) { socket.disconnect(); socket = null; }

    socket = io(MAC_HUB_URL, {
        auth: { token: pin },
        reconnection: true,
        reconnectionDelay: 3000,
        reconnectionAttempts: 10
    });

    socket.on('connect', () => {
        sessionStorage.setItem('bridge_pin', pin);
        pinOverlay.style.display = 'none';
        setHeaderState('connected');
        // clear "Conectando..." first bubble
        const first = chat.querySelector('.bubble-sys');
        if (first && first.textContent.includes('Conectando')) {
            first.innerHTML = '<strong>Sistema</strong>Hub conectado. Fábrica IA lista.';
        }
        renderPanel(S.IDLE);
    });

    socket.on('connect_error', () => {
        sessionStorage.removeItem('bridge_pin');
        setHeaderState('offline');
        pinError.textContent = 'PIN incorrecto o Hub offline';
        pinInput.classList.remove('shake');
        void pinInput.offsetWidth;
        pinInput.classList.add('shake');
        pinInput.value = '';
        pinOverlay.style.display = 'flex';
        setTimeout(() => pinInput.focus(), 50);
        setTimeout(() => { pinInput.classList.remove('shake'); pinError.textContent = ''; }, 1800);
        socket.disconnect();
    });

    socket.on('disconnect', () => {
        setHeaderState('offline');
        laMsg.textContent = 'Conexión perdida con el Hub.';
        removeProgress();
        // show reconnecting message
        addSysBubble('Conexión', 'Hub desconectado. Reconectando...');
    });

    // ── Factory events ────────────────────────────────────
    socket.on('fab:state', ({ state, message, data }) => {
        try {
            // Debug visible: actualizar titulo y dot inmediatamente
            document.title = state;
            hStage.textContent = state;

            laMsg.textContent = message || state;
            setHeaderState(['gemini_working','manus_working','claude_working','deploying'].includes(state) ? 'busy' : 'connected');

            removeProgress();

            if (state === S.IDLE && message) {
                addSysBubble('Sistema', message);
            }

            renderPanel(state, data);
        } catch(err) {
            panelContent.innerHTML = `<div style="color:var(--red);padding:12px;font-size:0.85rem;">Error JS: ${esc(err.message)}</div>`;
            console.error('fab:state error:', err);
        }
    });

    socket.on('fab:progress', ({ message }) => {
        laMsg.textContent = message;
        addProgress(message);
    });
}

// ── PIN flow ─────────────────────────────────────────────────
function validatePIN() {
    const pin = pinInput.value.trim();
    if (!pin) return;
    connectWithPin(pin);
}

// Mostrar panel IDLE de inmediato para que la UI no quede vacía
renderPanel(S.IDLE);

const savedPin = sessionStorage.getItem('bridge_pin');
if (savedPin) {
    connectWithPin(savedPin);
} else {
    pinOverlay.style.display = 'flex';
    setTimeout(() => pinInput.focus(), 300);
}
</script>
